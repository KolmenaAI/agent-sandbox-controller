name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  schedule:
    # Daily RustSec audit at 2 AM UTC to catch new advisories
    - cron: '0 2 * * *'

env:
  # Public image on GHCR (docker/metadata-action lowercases the repo slug).
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Installs the pinned toolchain + components from rust-toolchain.toml —
      # the same compiler as local builds and the Dockerfile.
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      # Runs rustfmt, cargo check, clippy (-D warnings) + generic hygiene hooks —
      # the same gate as local commits, so CI and dev machines can't drift.
      - run: pipx install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure
      - run: cargo test
      # The production musl binary is built and size-checked in the image-build /
      # image-smoke-test jobs (via the alpine Dockerfile). We don't cross-compile
      # musl here: aws-lc-sys (rustls) needs a musl C toolchain that ubuntu lacks,
      # and native alpine is the real production build anyway.

  # RustSec advisories against the dependency tree — this binary downloads and
  # extracts remote content inside every agent pod, so vuln alerts matter.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Prove the image builds (musl target, Dockerfile) before merge; the release
  # job is the only place the image is pushed. Also warms the buildx cache.
  image-build:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Smoke test the Docker image: verify it builds, starts, and responds to requests.
  # Runs only on non-tag builds (like image-build) to catch runtime issues before merge.
  image-smoke-test:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: controller:smoke-test
          cache-from: type=gha

      - name: Verify binary is executable and small
        run: |
          # Override the entrypoint so the shell runs (otherwise the args just
          # append to `agent-sandbox-controller`). Binary lives in /usr/local/bin.
          # Also guard the release size against the real production binary
          # (stripped, opt-level=z) — regressions here bloat every agent pod.
          docker run --rm --entrypoint sh controller:smoke-test -c '
            bin=/usr/local/bin/agent-sandbox-controller
            test -x "$bin"
            size=$(stat -c%s "$bin")
            echo "binary size: $size bytes"
            [ "$size" -lt 15728640 ] || { echo "::error::binary too large ($size bytes, expected < 15MB)"; exit 1; }
          '

      - name: Test /health and /status endpoints
        run: |
          # MODE=sidecar actually starts the HTTP server — the default (oneshot)
          # runs the boot sync and exits, so no endpoint would ever answer.
          docker run -d --name controller \
            -e MODE=sidecar \
            -e WORKSPACE_ROOT=/tmp/workspace \
            -p 8888:8888 \
            controller:smoke-test
          trap 'docker rm -f controller >/dev/null 2>&1 || true' EXIT

          # Poll /health until the server is up (it answers only after boot sync).
          for i in $(seq 1 20); do
            curl -sf http://localhost:8888/health >/dev/null && break
            if [ "$i" = 20 ]; then echo "::error::/health never came up"; docker logs controller; exit 1; fi
            sleep 1
          done

          STATUS=$(curl -sf http://localhost:8888/status)
          echo "status: $STATUS"
          echo "$STATUS" | grep -q '"sync_enabled"' || { echo "::error::/status missing sync_enabled"; exit 1; }
          echo "$STATUS" | grep -q '"version"'      || { echo "::error::/status missing version"; exit 1; }

  release:
    # A release is a `vX.Y.Z` tag — and ONLY that. No edge/latest/dev/prod
    # floating tags: the image is published at the exact version and consumers
    # pin it. Pushing the image + creating the GitHub Release are the release.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, audit]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      packages: write # push the image to GHCR
    steps:
      - uses: actions/checkout@v4
      # The tag is the source of truth for the version. Refuse to release if
      # Cargo.toml disagrees, so an image can never ship a mismatched version.
      - name: Verify Cargo.toml version matches the tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "tag=$tag  cargo=$crate"
          [ "$tag" = "$crate" ] || { echo "::error::tag v$tag != Cargo.toml version $crate"; exit 1; }
      # QEMU lets buildx cross-build the arm64 image on an amd64 runner.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE }}
          # Exactly the release version — e.g. tag v0.1.0 → image :0.1.0.
          tags: type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          # Multi-arch so the sidecar runs on amd64 and arm64 nodes. arm64 builds
          # under emulation, so this is release-only (not on every PR).
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
